name: Extract uploaded code package

on:
  push:
    paths:
      - ".github/workflows/extract-package.yml"
      - "state_capacity_tinyrnn_github_ready.zip"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract package
        run: |
          set -euo pipefail
          if [ ! -f state_capacity_tinyrnn_github_ready.zip ]; then
            echo "Package ZIP not found; nothing to extract."
            exit 0
          fi
          unzip -o state_capacity_tinyrnn_github_ready.zip -d .
          rm state_capacity_tinyrnn_github_ready.zip

      - name: Commit extracted files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No extracted-file changes to commit."
            exit 0
          fi
          git commit -m "Extract state-capacity TinyRNN reproducibility code"
          git push
